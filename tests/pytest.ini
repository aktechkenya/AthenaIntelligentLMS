[pytest]
testpaths = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    health: Service health checks
    auth: Authentication tests
    customers: Customer CRUD
    accounts: Account operations
    products: Product management
    loan_origination: Loan application lifecycle
    loan_management: Active loan operations
    payments: Payment processing
    accounting: GL / Journal entries
    float: Float management
    collections: Collections cases
    compliance: KYC / AML
    scoring: AI scoring
    overdraft: Wallet / Overdraft
    media: Document management
    notifications: Notification service
    gateway: API Gateway routing
    transfers: Account transfers
    fraud: Fraud detection service
    e2e: End-to-end cross-service flows
    smoke: Quick smoke tests
    load: Load / stress tests
addopts =
    -v
    --tb=short
    --strict-markers
    -p no:cacheprovider
